<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Add to Wallet — PassQR</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;background:#070B14;color:#E2E8F4;font-family:'DM Sans',system-ui,sans-serif;-webkit-font-smoothing:antialiased;}
.screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center;}
.logo{font-size:3rem;margin-bottom:16px;}
.title{font-size:1.3rem;font-weight:700;margin-bottom:6px;}
.sub{color:#5A6A8E;font-size:0.9rem;margin-bottom:32px;}
.btn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;max-width:340px;padding:16px 24px;border-radius:14px;border:none;cursor:pointer;font-size:1rem;font-weight:600;text-decoration:none;margin-bottom:12px;transition:opacity 0.15s;}
.btn:active{opacity:0.8;}
.apple{background:#fff;color:#000;}
.google{background:#4285F4;color:#fff;}
.public{background:rgba(79,126,255,0.15);border:1px solid rgba(79,126,255,0.3);color:#7B9FFF;}
.spinner{width:40px;height:40px;border:3px solid rgba(255,255,255,0.15);border-top-color:#4F7EFF;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 20px;}
@keyframes spin{to{transform:rotate(360deg);}}
.redirecting{color:#5A6A8E;font-size:0.88rem;}
.code{font-family:monospace;font-size:0.78rem;color:#5A6A8E;margin-top:8px;letter-spacing:0.05em;}
</style>
</head>
<body>
<div class="screen" id="screen">
  <div class="spinner" id="spinner"></div>
  <p class="redirecting">Detecting your device…</p>
  <p class="code" id="code-display"></p>
</div>

<script>
const params = new URLSearchParams(location.search);
const code   = params.get('code') || '';

// Apple Wallet → passqr.com Next.js route (creates signed .pkpass)
// Google Wallet → Supabase edge function `wallet-google` (multi-tenant JWT signer)
//
// Why two different hosts? They use independent credentials:
//   • Apple uses signing certs configured on Vercel (the passqr.com host)
//   • Google uses a service account JSON configured on Supabase
// `wallet-google` resolves the right business + class definition from
// businesses.config.google_wallet, so all three tenants (Aiphone, Sin Chew,
// Studio demo) share one URL.
const appleUrl  = `https://www.passqr.com/api/wallet/apple?code=${code}`;
const googleUrl = `https://gyllfnsnniuqaarsulsk.supabase.co/functions/v1/wallet-google?code=${code}`;
const publicUrl = `https://www.passqr.com/p/${code}`;

function isIOS(){
  return /iPad|iPhone|iPod/.test(navigator.userAgent) ||
         (navigator.platform==='MacIntel' && navigator.maxTouchPoints>1);
}
function isAndroid(){
  return /Android/.test(navigator.userAgent);
}

function showFallback(){
  document.getElementById('screen').innerHTML = `
    <div class="logo">🎫</div>
    <h1 class="title">Add to Your Wallet</h1>
    <p class="sub">Choose your device type below</p>
    <a href="${appleUrl}" class="btn apple">🍎 Add to Apple Wallet</a>
    <a href="${googleUrl}" class="btn google">🔵 Save to Google Wallet</a>
    <a href="${publicUrl}" class="btn public" target="_blank">🔗 View pass page</a>
    <p class="code">${code}</p>
  `;
}

if(!code){
  document.getElementById('screen').innerHTML = '<p style="color:#FF4D6D">No pass code provided.</p>';
} else {
  document.getElementById('code-display').textContent = code;
  if(isIOS()){
    window.location.href = appleUrl;
  } else if(isAndroid()){
    window.location.href = googleUrl;
  } else {
    // Desktop — show buttons immediately
    showFallback();
  }
  // Fallback if redirect hasn't happened in 1.5s
  setTimeout(showFallback, 1500);
}
</script>
</body>
</html>
